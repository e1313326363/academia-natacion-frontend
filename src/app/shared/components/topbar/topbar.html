<header class="topbar">
  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-sm btn-outline-secondary d-md-none" (click)="menuToggle.emit()">
      <i class="bi bi-list fs-5"></i>
    </button>
    <span class="fw-semibold text-secondary d-none d-md-block">Academia de Natación</span>
  </div>
  <div class="d-flex align-items-center gap-3">
    <div class="d-flex align-items-center gap-2">
      <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white"
           style="width:34px;height:34px;font-size:0.85rem;font-weight:600;">
        {{ user?.name?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="d-none d-sm-block">
        <div style="font-size:0.85rem;font-weight:600;">{{ user?.name }}</div>
        <div style="font-size:0.75rem;color:#6b7280;">{{ user?.role }}</div>
      </div>
    </div>
    <button class="btn btn-sm btn-outline-danger" (click)="logout()" title="Cerrar sesión">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</header>
