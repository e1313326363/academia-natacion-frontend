<div class="d-flex align-items-center gap-2 mb-4">
  <a routerLink="/pagos" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <div><h4 class="fw-bold mb-0">Registrar Pago</h4><small class="text-muted">Registra una mensualidad</small></div>
</div>
<div class="card border-0 shadow-sm" style="max-width:560px;border-radius:12px;">
  <div class="card-body p-4">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Inscripción <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="id_inscripcion" [class.is-invalid]="f['id_inscripcion'].invalid && f['id_inscripcion'].touched">
          <option [ngValue]="null">Selecciona una inscripción…</option>
          <option *ngFor="let i of inscripciones" [ngValue]="i.id_inscripcion">
            #{{ i.id_inscripcion }} – {{ i.estudiante?.nombre }} / {{ i.clase?.nombre_clase }}
          </option>
        </select>
        <div class="invalid-feedback">Selecciona una inscripción.</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Monto <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" class="form-control" formControlName="monto" min="0.01" step="0.01" placeholder="0.00"
                 [class.is-invalid]="f['monto'].invalid && f['monto'].touched">
        </div>
        <div class="invalid-feedback">Ingresa un monto válido.</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Fecha de pago</label>
        <input type="date" class="form-control" formControlName="fecha_pago">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Método de pago <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="metodo_pago">
          <option>Efectivo</option><option>Tarjeta</option><option>Transferencia</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Estado</label>
        <select class="form-select" formControlName="estado">
          <option>Pagado</option><option>Pendiente</option><option>Vencido</option>
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4" [disabled]="saving">
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
          <i class="bi bi-check-lg me-1" *ngIf="!saving"></i>{{ saving ? 'Guardando...' : 'Guardar' }}
        </button>
        <a routerLink="/pagos" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
