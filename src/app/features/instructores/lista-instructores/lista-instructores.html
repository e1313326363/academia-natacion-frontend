<div class="d-flex justify-content-between align-items-center mb-4">
  <div><h4 class="fw-bold mb-0">Instructores</h4><small class="text-muted">Personal docente de la academia</small></div>
  <a routerLink="nuevo" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo instructor</a>
</div>
<div class="card table-card">
  <div class="card-header bg-white py-3 d-flex gap-2">
    <input type="text" class="form-control" style="max-width:300px" placeholder="Buscar por nombre…"
           [(ngModel)]="search" (keyup.enter)="load()">
    <button class="btn btn-outline-secondary" (click)="load()"><i class="bi bi-search"></i></button>
  </div>
  <div class="text-center py-5" *ngIf="loading"><div class="spinner-border text-primary"></div></div>
  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr><th>#</th><th>Nombre</th><th>Especialidad</th><th>Email</th><th class="text-center">Acciones</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let i of data?.data">
          <td class="text-muted small">{{ i.id_instructor }}</td>
          <td class="fw-semibold">{{ i.nombre }}</td>
          <td>{{ i.especialidad || '—' }}</td>
          <td>{{ i.email || '—' }}</td>
          <td class="text-center">
            <a [routerLink]="['editar', i.id_instructor]" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
            <button class="btn btn-sm btn-outline-danger" (click)="confirmDelete(i.id_instructor)"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
        <tr *ngIf="!data?.data?.length"><td colspan="5" class="text-center text-muted py-4">No se encontraron instructores.</td></tr>
      </tbody>
    </table>
  </div>
  <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3" *ngIf="data">
    <small class="text-muted">Total: {{ data.total }} registros</small>
    <div class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-secondary" [disabled]="data.current_page===1" (click)="load(data.current_page-1)"><i class="bi bi-chevron-left"></i></button>
      <span class="btn btn-sm btn-primary disabled">{{ data.current_page }} / {{ data.last_page }}</span>
      <button class="btn btn-sm btn-outline-secondary" [disabled]="data.current_page===data.last_page" (click)="load(data.current_page+1)"><i class="bi bi-chevron-right"></i></button>
    </div>
  </div>
</div>
<app-confirm-dialog [visible]="showConfirm" (confirmed)="doDelete()" (cancelled)="showConfirm=false"></app-confirm-dialog>
