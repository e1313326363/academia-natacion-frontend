<div class="d-flex align-items-center gap-2 mb-4">
  <a routerLink="/asistencias" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <div><h4 class="fw-bold mb-0">Registrar Asistencia</h4><small class="text-muted">Marca la asistencia de un alumno</small></div>
</div>
<div class="card border-0 shadow-sm" style="max-width:560px;border-radius:12px;">
  <div class="card-body p-4">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Inscripción <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="id_inscripcion" [class.is-invalid]="f['id_inscripcion'].invalid && f['id_inscripcion'].touched">
          <option [ngValue]="null">Selecciona una inscripción activa…</option>
          <option *ngFor="let i of inscripciones" [ngValue]="i.id_inscripcion">
            {{ i.estudiante?.nombre }} – {{ i.clase?.nombre_clase }}
          </option>
        </select>
        <div class="invalid-feedback">Selecciona una inscripción.</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Fecha de clase <span class="text-danger">*</span></label>
        <input type="date" class="form-control" formControlName="fecha_clase" [class.is-invalid]="f['fecha_clase'].invalid && f['fecha_clase'].touched">
        <div class="invalid-feedback">La fecha es obligatoria.</div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">¿Asistió?</label>
        <div class="d-flex gap-3 mt-1">
          <div class="form-check">
            <input class="form-check-input" type="radio" formControlName="asistio" value="Si" id="si">
            <label class="form-check-label" for="si">Sí asistió</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" formControlName="asistio" value="No" id="no">
            <label class="form-check-label" for="no">No asistió</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4" [disabled]="saving">
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
          <i class="bi bi-check-lg me-1" *ngIf="!saving"></i>{{ saving ? 'Guardando...' : 'Guardar' }}
        </button>
        <a routerLink="/asistencias" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
