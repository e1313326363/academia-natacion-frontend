<div class="d-flex align-items-center gap-2 mb-4">
  <a routerLink="/inscripciones" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <div><h4 class="fw-bold mb-0">Nueva Inscripción</h4><small class="text-muted">Inscribe un alumno en una clase</small></div>
</div>
<div class="card border-0 shadow-sm" style="max-width:560px;border-radius:12px;">
  <div class="card-body p-4">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Estudiante <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="id_estudiante" [class.is-invalid]="f['id_estudiante'].invalid && f['id_estudiante'].touched">
          <option [ngValue]="null">Selecciona un estudiante…</option>
          <option *ngFor="let e of estudiantes" [ngValue]="e.id_estudiante">{{ e.nombre }}</option>
        </select>
        <div class="invalid-feedback">Selecciona un estudiante.</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Clase <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="id_clase" [class.is-invalid]="f['id_clase'].invalid && f['id_clase'].touched">
          <option [ngValue]="null">Selecciona una clase…</option>
          <option *ngFor="let c of clases" [ngValue]="c.id_clase">{{ c.nombre_clase }}</option>
        </select>
        <div class="invalid-feedback">Selecciona una clase.</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Fecha de inscripción</label>
        <input type="date" class="form-control" formControlName="fecha_inscripcion">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Estado</label>
        <select class="form-select" formControlName="estado">
          <option>Activo</option><option>Suspendido</option><option>Baja</option>
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4" [disabled]="saving">
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
          <i class="bi bi-check-lg me-1" *ngIf="!saving"></i>{{ saving ? 'Guardando...' : 'Guardar' }}
        </button>
        <a routerLink="/inscripciones" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
