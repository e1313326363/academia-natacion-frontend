<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background:linear-gradient(135deg,#1a1f3a 0%,#2d3561 100%)">
  <div class="card border-0 shadow-lg" style="width:100%;max-width:420px;border-radius:16px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-water text-primary" style="font-size:3rem;"></i>
        <h3 class="mt-2 fw-bold">Academia de Natación</h3>
        <p class="text-muted small">Ingresa tus credenciales para continuar</p>
      </div>

      <div class="alert alert-danger py-2" *ngIf="error">
        <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" formControlName="email"
                   [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
                   placeholder="admin@academia.com">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" formControlName="password"
                   [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
                   placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i class="bi bi-box-arrow-in-right me-2" *ngIf="!loading"></i>
          {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
        </button>
      </form>
    </div>
  </div>
</div>
